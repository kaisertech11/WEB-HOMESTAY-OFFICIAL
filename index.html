<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE STAY | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: white; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 800; font-size: 18px; letter-spacing: 3px; text-transform: uppercase; border: 2px solid black; padding: 5px 12px; text-decoration: none; color: black; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .nav-right a { text-decoration: none; color: black; font-weight: 700; font-size: 13px; text-transform: uppercase; }
        .slider-container { width: 100%; height: 85vh; position: relative; overflow: hidden; background: #000; }
        .slide { width: 100%; height: 100%; position: absolute; top: 0; left: 0; opacity: 0; transition: opacity 1.5s; }
        .slide.active { opacity: 1; }
        .slide img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); }
        .hero-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; text-align: center; color: white; width: 90%; }
        .hero-content h1 { font-size: clamp(40px, 8vw, 80px); font-weight: 800; line-height: 0.9; margin-bottom: 20px; }
        .btn-main { display: inline-block; padding: 15px 35px; background: white; color: black; text-decoration: none; font-weight: 700; border-radius: 50px; }
        footer { background: black; color: white; padding: 60px 5%; }
        .footer-grid { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 20px; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">THE STAY</a>
        <div class="nav-right">
            <a href="order.html">ORDER</a>
            <a href="https://www.instagram.com/zeeeq._" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@._ipan9" target="_blank"><i class="fab fa-tiktok"></i></a>
        </div>
    </header>
    <div class="slider-container">
        <div class="slide active"><img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=2000&q=80"></div>
        <div class="slide"><img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=2000&q=80"></div>
        <div class="hero-content">
            <h1>ESSENTIAL<br>COMFORT.</h1>
            <a href="order.html" class="btn-main">EXPLORE UNITS</a>
        </div>
    </div>
    <footer>
        <div class="footer-grid">
            <div><h2>THE STAY EXCLUSIVE</h2><p>"Ketenangan alam dalam keselesaan moden."</p></div>
            <div style="text-align:right"><h3>+60 13-684 1826</h3></div>
        </div>
    </footer>
    <script>
        const slides = document.querySelectorAll('.slide');
        let current = 0;
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 4000);
    </script>
</body>
</html>
