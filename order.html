<!DOCTYPE html>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: white; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }

        .nav-right a { text-decoration: none; color: black; font-weight: 700; font-size: 13px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 40px 5%; min-height: 60vh; }
        .item-card { text-decoration: none; color: black; border: 1px solid #eee; transition: 0.3s; }
        .item-card img { width: 100%; height: 250px; object-fit: cover; }
        .info { padding: 20px; }
        .name { font-weight: 800; font-size: 18px; text-transform: uppercase; }
        .price { color: #888; margin-top: 5px; }
        footer { background: black; color: white; padding: 60px 5%; }
        .footer-grid { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 20px; }
        .social-icons a { color: white; margin-left: 15px; font-size: 18px; }
    </style>
</head>
