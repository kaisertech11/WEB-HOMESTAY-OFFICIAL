<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE STAY | Order</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        header { padding: 20px 5%; border-bottom: 1px solid #eee; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 40px 5%; }
        .item-card { text-decoration: none; color: black; border: 1px solid #eee; transition: 0.3s; }
        .item-card img { width: 100%; height: 250px; object-fit: cover; }
        .info { padding: 20px; }
        .name { font-weight: 800; font-size: 18px; text-transform: uppercase; }
        .price { color: #888; margin-top: 5px; }
    </style>
</head>
<body>
    <header><a href="index.html" style="font-weight:800; text-decoration:none; color:black;">THE STAY</a></header>
    <div class="grid">
        <a href="detail-room1.html" class="item-card">
            <img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=800">
            <div class="info"><p class="name">THE LOFT SUITE</p><p class="price">RM 250 / night</p></div>
        </a>
        <a href="detail-room2.html" class="item-card">
            <img src="https://images.unsplash.com/photo-1556911223-e45243376f67?w=800">
            <div class="info"><p class="name">GARDEN VILLA</p><p class="price">RM 400 / night</p></div>
        </a>
        <a href="detail-room3.html" class="item-card">
            <img src="https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=800">
            <div class="info"><p class="name">STUDIO APARTMENT</p><p class="price">RM 180 / night</p></div>
        </a>
    </div>
</body>
</html>
